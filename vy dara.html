<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quant AI Gold Dashboard</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    h1 {
        margin-bottom: 20px;
        text-align: center;
        color: #00ffcc;
    }
    .dashboard {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        width: 100%;
        max-width: 1000px;
    }
    .signal-card {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        width: 100%;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .signal-card h2 {
        font-size: 2em;
        margin-bottom: 10px;
    }
    .buy { color: lime; text-shadow: 0 0 10px lime; }
    .sell { color: red; text-shadow: 0 0 10px red; }
    .neutral { color: gray; }
    .metrics {
        display: flex;
        justify-content: space-around;
        margin-top: 10px;
    }
    .metrics div {
        font-size: 1.1em;
    }
    iframe {
        border: none;
        width: 100%;
        height: 500px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

<h1>⚡ Quant AI Gold Dashboard</h1>

<div class="dashboard">
    <!-- Signal Card -->
    <div class="signal-card">
        <h2 id="signal">Loading...</h2>
        <div class="metrics">
            <div>Z-Score: <span id="z"></span></div>
            <div>Imbalance: <span id="imbalance"></span></div>
            <div>Trend: <span id="trend"></span></div>
        </div>
    </div>

    <!-- TradingView Chart -->
    <iframe 
        src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_123&symbol=OANDA:XAUUSD&interval=1&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark"
        allowtransparency="true"
        scrolling="no">
    </iframe>
</div>

<script>
// ── SIMULATED MARKET DATA FOR DEMO ──
function generateData(period = 30) {
    let data = [];
    let price = 2000; // start price
    for (let i = 0; i < period; i++) {
        let change = (Math.random() - 0.5) * 10;
        let close = price + change;
        let high = close + Math.random() * 5;
        let low = close - Math.random() * 5;
        let volume = Math.random() * 1000;
        data.push({ close, high, low, volume });
        price = close;
    }
    return data;
}

// ── QUANT SIGNAL CALCULATION ──
function calculateSignal(data) {
    const period = data.length;
    let closes = data.map(d => d.close);
    let highs = data.map(d => d.high);
    let lows = data.map(d => d.low);
    let volumes = data.map(d => d.volume);

    // Z-score
    let mean = closes.reduce((a,b)=>a+b,0)/period;
    let std = Math.sqrt(closes.map(x=>Math.pow(x-mean,2)).reduce((a,b)=>a+b,0)/period);
    let z = std > 0 ? (closes[period-1] - mean)/std : 0;

    // Buy/sell pressure imbalance
    let buyPressure = 0, sellPressure = 0;
    for (let i = 0; i < period; i++) {
        let range = highs[i]-lows[i];
        if(range>0){
            buyPressure += volumes[i] * ((closes[i]-lows[i])/range);
            sellPressure += volumes[i] * ((highs[i]-closes[i])/range);
        }
    }
    let imbalance = (buyPressure - sellPressure)/(buyPressure+sellPressure);

    // Trend
    let trend = closes[period-1] - closes[0];

    // Signal logic
    let signal = "NO TRADE";
    if (z <= -2 && trend > 0) signal = "BUY";
    else if (z >= 2 && trend < 0) signal = "SELL";

    return { signal, z, imbalance, trend: trend>0?"UP":"DOWN" };
}

// ── UPDATE DASHBOARD ──
function updateDashboard() {
    let data = generateData();
    let result = calculateSignal(data);

    const signalEl = document.getElementById("signal");
    const zEl = document.getElementById("z");
    const imEl = document.getElementById("imbalance");
    const trendEl = document.getElementById("trend");

    signalEl.innerText = result.signal;
    signalEl.className = result.signal === "BUY" ? "buy" :
                         result.signal === "SELL" ? "sell" : "neutral";

    zEl.innerText = result.z.toFixed(2);
    imEl.innerText = (result.imbalance*100).toFixed(2) + "%";
    trendEl.innerText = result.trend;
}

// Refresh every 2 seconds
setInterval(updateDashboard, 2000);
updateDashboard();
</script>

</body>
</html>
